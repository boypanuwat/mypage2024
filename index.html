<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phanuwat Chaisri - Software Tester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #2c3e50 0%, #34495e 100%);
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            padding: 40px 0;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
            z-index: 100;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 0 0 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .sidebar-header .profile-section {
            background: transparent;
            border-radius: 0;
            padding: 30px 20px 25px;
            box-shadow: none;
            margin-bottom: 0;
            text-align: center;
            border-bottom: none;
        }

        .sidebar-header .profile-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 15px;
            border: 4px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .sidebar-header .profile-name {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .sidebar-header .profile-role {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 400;
            margin-bottom: 0;
        }

        .sidebar-title {
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .sidebar-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            padding: 0 20px;
            text-align: center;
        }

        .menu {
            list-style: none;
            padding: 0;
        }

        .menu-item {
            margin: 5px 15px;
        }

        .menu-link {
            display: block;
            padding: 14px 20px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 15px;
            cursor: pointer;
        }

        .menu-link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: translateX(5px);
        }

        .menu-link.active {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-weight: 500;
        }

        .menu-link.has-submenu {
            position: relative;
        }

        .menu-link.has-submenu::after {
            content: '▼';
            position: absolute;
            right: 20px;
            font-size: 10px;
            transition: transform 0.3s ease;
        }

        .menu-link.has-submenu.open::after {
            transform: rotate(180deg);
        }

        .submenu {
            list-style: none;
            padding: 0;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .submenu.open {
            max-height: 500px;
        }

        .submenu-item {
            margin: 0;
        }

        .submenu-link {
            display: block;
            padding: 10px 20px 10px 50px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submenu-link:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .submenu-link.active {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            border-left: 3px solid #3498db;
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 30px;
            width: calc(100% - 280px);
            min-height: 100vh;
        }

        /* Profile Section */
        .profile-section {
            background: #fff;
            border-radius: 16px;
            padding: 50px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
            text-align: center;
        }

        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 25px;
            border: 5px solid #f0f0f0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .profile-name {
            font-size: 36px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .profile-role {
            font-size: 20px;
            color: #7f8c8d;
            font-weight: 400;
        }

        /* Content Section */
        .content-section {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
            min-height: calc(100vh - 100px);
            max-height: calc(100vh - 80px);
            overflow-y: auto;
        }

        .content-section::-webkit-scrollbar {
            width: 8px;
        }

        .content-section::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .content-section::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 10px;
        }

        .content-section::-webkit-scrollbar-thumb:hover {
            background: #a0aec0;
        }

        .content-wrapper {
            opacity: 0;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .content-section h1 {
            color: #2c3e50;
            font-size: 32px;
            margin-bottom: 20px;
            border-bottom: 3px solid #3498db;
            padding-bottom: 15px;
        }

        .content-section h2 {
            color: #34495e;
            font-size: 24px;
            margin-top: 30px;
            margin-bottom: 15px;
        }

        .content-section h3 {
            color: #485f7a;
            font-size: 19px;
            margin-top: 20px;
            margin-bottom: 12px;
        }

        .content-section p {
            color: #5a6c7d;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .content-section ul,
        .content-section ol {
            margin-left: 25px;
            margin-bottom: 15px;
            color: #5a6c7d;
            line-height: 1.8;
        }

        .content-section li {
            margin-bottom: 8px;
        }

        .content-section code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #e74c3c;
        }

        .content-section pre {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        .content-section strong {
            color: #2c3e50;
            font-weight: 600;
        }

        .content-section a {
            color: #3498db;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s;
        }

        .content-section a:hover {
            border-bottom-color: #3498db;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 20px 0;
            }

            .main-content {
                margin-left: 0;
                width: 100%;
                padding: 20px;
            }

            .profile-section {
                padding: 30px 20px;
            }

            .profile-name {
                font-size: 28px;
            }

            .profile-role {
                font-size: 16px;
            }

            .content-section {
                padding: 25px;
                max-height: none;
            }

            .content-section h1 {
                font-size: 24px;
            }

            .menu-link {
                font-size: 14px;
            }
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <!-- Profile Section -->
                <section class="profile-section">
                    <img src="profile.jpg" alt="Profile Image" class="profile-image" />
                    <h1 class="profile-name">Phanuwat Chaisri</h1>
                    <p class="profile-role">Software Tester</p>
                </section>
                <div class="sidebar-subtitle">QA Resources & Guides</div>
            </div>
            <ul class="menu">
                <li class="menu-item">
                    <a class="menu-link active" data-content="profile">Skills & Experience</a>
                </li>
                <li class="menu-item">
                    <a class="menu-link has-submenu" id="ai-menu">AI Prompt</a>
                    <ul class="submenu" id="ai-submenu">
                        <li class="submenu-item">
                            <a class="submenu-link" data-content="ai">Overview</a>
                        </li>
                        <li class="submenu-item">
                            <a class="submenu-link" data-content="ai-prompt">Prompt Concept</a>
                        </li>
                        <li class="submenu-item">
                            <a class="submenu-link" data-content="ai-testcase">Test Case Template</a>
                        </li>
                    </ul>
                </li>
                <li class="menu-item">
                    <a class="menu-link" data-file="playwright.html">Playwright Guide</a>
                </li>
                <li class="menu-item">
                    <a class="menu-link" data-file="appium.html">Appium Setup</a>
                    
                </li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Dynamic Content Section -->
            <section class="content-section">
                <div class="content-wrapper" id="content">
                    <div class="loading">Loading...</div>
                </div>
            </section>
        </main>
    </div>

    <script src="content-ai.js"></script>
    <script src="content-profile.js"></script>
    <script>
        const contentData = {
            profile: profileContent,
            ai: aiContent,
            'ai-prompt': aiPromptContent,
            'ai-testcase': aiPromptTestcase
        };

        function parseMarkdown(text) {
            let html = text;

            // Headers
            html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');

            // Bold
            html = html.replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>');

            // Links
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/gim, '<a href="$2" target="_blank">$1</a>');

            // Code blocks
            html = html.replace(/```([\s\S]*?)```/gim, '<pre>$1</pre>');

            // Inline code
            html = html.replace(/`([^`]+)`/gim, '<code>$1</code>');

            // Line breaks
            html = html.replace(/\n\n/g, '</p><p>');
            html = html.replace(/\n/g, '<br>');

            // Unordered lists
            html = html.replace(/^\* (.+)$/gim, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');

            // Numbered lists
            html = html.replace(/^\d+\. (.+)$/gim, '<li>$1</li>');

            // Wrap in paragraphs
            html = '<p>' + html + '</p>';

            // Clean up
            html = html.replace(/<p><\/p>/g, '');
            html = html.replace(/<p>(<h[1-6]>)/g, '$1');
            html = html.replace(/(<\/h[1-6]>)<\/p>/g, '$1');
            html = html.replace(/<p>(<ul>)/g, '$1');
            html = html.replace(/(<\/ul>)<\/p>/g, '$1');
            html = html.replace(/<p>(<pre>)/g, '$1');
            html = html.replace(/(<\/pre>)<\/p>/g, '$1');

            return html;
        }

        function loadContent(contentKey) {
            const contentDiv = document.getElementById('content');
            const rawContent = contentData[contentKey] || '<p>Content not found.</p>';
            const htmlContent = parseMarkdown(rawContent);

            contentDiv.style.opacity = '0';

            setTimeout(() => {
                contentDiv.innerHTML = `<div class="content-wrapper">${htmlContent}</div>`;
                contentDiv.style.opacity = '1';
            }, 200);

            // Update active menu
            document.querySelectorAll('.menu-link').forEach(link => {
                link.classList.remove('active');
            });
            const activeLink = document.querySelector(`[data-content="${contentKey}"]`);
            if (activeLink) activeLink.classList.add('active');
        }

        function loadContentFromFile(fileName) {
            const contentDiv = document.getElementById('content');
            contentDiv.style.opacity = '0';

            setTimeout(() => {
                contentDiv.innerHTML = `<div class="content-wrapper">
                    <iframe src="${fileName}" style="width: 100%; height: calc(100vh - 160px); border: none; border-radius: 8px;"></iframe>
                </div>`;
                contentDiv.style.opacity = '1';
            }, 200);
        }

        // Submenu toggle
        const aiMenu = document.getElementById('ai-menu');
        const aiSubmenu = document.getElementById('ai-submenu');
        
        if (aiMenu) {
            aiMenu.addEventListener('click', function(e) {
                e.preventDefault();
                aiSubmenu.classList.toggle('open');
                aiMenu.classList.toggle('open');
            });
        }

        // Event listeners for menu links
        document.querySelectorAll('.menu-link:not(.has-submenu)').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                
                const contentKey = this.getAttribute('data-content');
                const fileName = this.getAttribute('data-file');
                
                // Update active state
                document.querySelectorAll('.menu-link').forEach(l => l.classList.remove('active'));
                this.classList.add('active');
                
                // ถ้ามี data-file ให้โหลดจากไฟล์
                if (fileName) {
                    loadContentFromFile(fileName);
                }
                // ถ้ามี data-content ให้โหลดแบบ single-page
                else if (contentKey) {
                    loadContent(contentKey);
                }
            });
        });

        // Event listeners for submenu links
        document.querySelectorAll('.submenu-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const contentKey = this.getAttribute('data-content');
                loadContent(contentKey);
                
                // Update active state
                document.querySelectorAll('.submenu-link').forEach(l => l.classList.remove('active'));
                this.classList.add('active');
                
                // Keep AI menu highlighted
                document.querySelectorAll('.menu-link').forEach(l => l.classList.remove('active'));
                if (aiMenu) aiMenu.classList.add('active');
            });
        });

        // Load default content
        window.addEventListener('DOMContentLoaded', () => {
            loadContent('profile');
        });
    </script>
</body>

</html>
